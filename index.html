<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treino Só Capa FF</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-zinc-950 text-white p-6">
  <div class="max-w-4xl mx-auto">
    <h1 class="text-3xl font-bold mb-2">🎯 Treino Só Capa FF</h1>
    <p class="text-zinc-400 mb-6">App de treino legal para iPhone e Android com sensibilidade por arma.</p>

    <div id="cards" class="grid md:grid-cols-2 gap-4"></div>

    <div class="mt-8 bg-zinc-900 rounded-3xl p-5 border border-zinc-800">
      <h2 class="text-xl font-semibold mb-3">🔥 Treino de puxada</h2>
      <ul class="space-y-2 text-zinc-300">
        <li>• Arrasto curto para iPhone</li>
        <li>• Arrasto médio para Android</li>
        <li>• Ajuste para 60Hz / 90Hz / 120Hz</li>
        <li>• Perfil 2, 3 e 4 dedos</li>
      </ul>
    </div>
  </div>

  <script>
    const weapons = [
      { nome: 'MP40', geral: 98, redDot: 92, x2: 85, x4: 78, awm: 50 },
      { nome: 'M1887', geral: 100, redDot: 95, x2: 88, x4: 80, awm: 45 },
      { nome: 'XM8', geral: 94, redDot: 88, x2: 82, x4: 76, awm: 55 },
      { nome: 'AK', geral: 90, redDot: 86, x2: 80, x4: 74, awm: 60 }
    ];

    const cards = document.getElementById('cards');
    weapons.forEach(arma => {
      const div = document.createElement('div');
      div.className = 'bg-zinc-900 rounded-3xl p-5 shadow-lg border border-zinc-800';
      div.innerHTML = `
        <h2 class="text-xl font-semibold mb-3">${arma.nome}</h2>
        <div class="space-y-2 text-sm">
          <p>Geral: <span class="font-bold">${arma.geral}</span></p>
          <p>Red Dot: <span class="font-bold">${arma.redDot}</span></p>
          <p>2x: <span class="font-bold">${arma.x2}</span></p>
          <p>4x: <span class="font-bold">${arma.x4}</span></p>
          <p>AWM: <span class="font-bold">${arma.awm}</span></p>
        </div>
        <button onclick="alert('Modo capa aplicado para ${arma.nome}!')" class="mt-4 w-full bg-white text-black rounded-2xl py-2 font-semibold">Aplicar modo capa</button>
      `;
      cards.appendChild(div);
    });
  </script>
</body>
</html>
